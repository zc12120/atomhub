services:
  atomhub:
    build: .
    container_name: atomhub
    ports:
      - "${ATOMHUB_PUBLIC_PORT:-8080}:8080"
    environment:
      ATOMHUB_HTTP_ADDR: ":8080"
      ATOMHUB_DB_PATH: "/app/data/atomhub.db"
      ATOMHUB_SESSION_SECRET: "change-me-session-secret"
      ATOMHUB_ADMIN_USERNAME: "admin"
      ATOMHUB_ADMIN_PASSWORD: "change-me-admin-password"
      ATOMHUB_GATEWAY_TOKEN: "change-me-gateway-token"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
